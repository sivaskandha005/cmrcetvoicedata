<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceBank - Admin Dashboard</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --danger: #dc2626; }
        body { font-family: system-ui, sans-serif; background: var(--bg); padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; font-weight: 600; }
        .btn { background: var(--primary); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .status-msg { padding: 10px; border-radius: 6px; margin-bottom: 10px; display: none; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Admin Dashboard</h1>
        <button onclick="loadData()" class="btn">Refresh Data</button>
    </div>

    <div id="status" class="status-msg"></div>

    <div class="card">
        <h3>Student Recordings</h3>
        <table>
            <thead>
                <tr>
                    <th>Roll Number</th>
                    <th>Name</th>
                    <th>Duration</th>
                    <th>Recorded At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTable">
                <tr><td colspan="5">Click Refresh to load data.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadData() {
        const password = prompt("Enter Admin Password:");
        if (!password) return;

        const statusDiv = document.getElementById('status');
        const tableBody = document.getElementById('studentTable');
        
        statusDiv.style.display = 'none';
        tableBody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

        try {
            // Using relative path to match Vercel rewrites
            const response = await fetch('/summary', {
                method: 'GET',
                headers: {
                    'X-Admin-Password': password,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error('Invalid password or server error');
            }

            const students = await response.json();
            renderTable(students);

        } catch (err) {
            statusDiv.innerText = err.message;
            statusDiv.className = 'status-msg error';
            statusDiv.style.display = 'block';
            tableBody.innerHTML = '<tr><td colspan="5">Failed to load data.</td></tr>';
        }
    }

    function renderTable(students) {
        const tableBody = document.getElementById('studentTable');
        if (students.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5">No recordings found in temporary storage.</td></tr>';
            return;
        }

        tableBody.innerHTML = students.map(s => {
            // Fix for "Invalid Date" - uses the timestamp field saved by the backend
            const dateDisplay = s.timestamp ? new Date(s.timestamp).toLocaleString() : "Recently Recorded";
            
            return `
                <tr>
                    <td><strong>${s.roll || 'N/A'}</strong></td>
                    <td>${s.name || 'Unknown'}</td>
                    <td>${s.duration || '0'}s</td>
                    <td>${dateDisplay}</td>
                    <td>
                        <a href="/download?roll=${encodeURIComponent(s.roll)}&file=${encodeURIComponent(s.fileName)}" 
                           class="btn" style="background:#10b981;">
                           Download ⬇️
                        </a>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // Auto-load on page visit
    window.onload = loadData;
</script>

</body>
</html>

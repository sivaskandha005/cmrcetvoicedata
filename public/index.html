<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceBank - Student Data Collection</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 500px; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 1rem; }
        .btn:disabled { background: #94a3b8; }
        .status { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; }
        .error { background: #fee2e2; color: #991b1b; }
        .success { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="card">
    <h2>Student Voice Registration</h2>
    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">
    </div>
    <div class="input-group">
        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="Enter Roll Number">
    </div>

    <button id="recordBtn" class="btn">Start Recording</button>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const recordBtn = document.getElementById('recordBtn');
    const statusMsg = document.getElementById('statusMsg');

    recordBtn.addEventListener('click', async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            const name = document.getElementById('name').value;
            const roll = document.getElementById('roll').value;

            if (!name || !roll) {
                showStatus('Please enter both Name and Roll Number', 'error');
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
                mediaRecorder.onstop = () => uploadAudio(name, roll);

                mediaRecorder.start();
                recordBtn.innerText = 'Stop Recording';
                recordBtn.style.background = '#dc2626';
                showStatus('Recording...', 'success');
            } catch (err) {
                showStatus('Microphone access denied', 'error');
            }
        } else {
            mediaRecorder.stop();
            recordBtn.innerText = 'Start Recording';
            recordBtn.style.background = '#2563eb';
        }
    });

    async function uploadAudio(name, roll) {
        showStatus('Uploading...', 'success');
        
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            
            const payload = {
                studentInfo: { name, roll, timestamp: new Date().toISOString() },
                audio: base64Audio,
                ext: 'webm'
            };

            try {
                // IMPORTANT: Path is relative to work with Vercel Rewrites
                const response = await fetch('/api/save-recording', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.ok) {
                    showStatus('Recording saved successfully!', 'success');
                } else {
                    throw new Error(result.error || 'Server error');
                }
            } catch (err) {
                showStatus('Failed to save recording. Check internet connection.', 'error');
                console.error(err);
            }
        };
    }

    function showStatus(msg, type) {
        statusMsg.innerText = msg;
        statusMsg.className = `status ${type}`;
        statusMsg.style.display = 'block';
    }
</script>

</body>
</html>
